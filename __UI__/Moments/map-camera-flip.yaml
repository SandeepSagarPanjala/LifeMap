appId: com.sunrio.lifemap
---
# P0 — flip front/back camera without getting stuck on the map shutter.
- runFlow:
    file: ../shared/subflows/launch-to-map-warm.yaml
- tapOn: 'Take a photo'
- runFlow:
    file: ../shared/subflows/dismiss-system-dialogs.yaml
- extendedWaitUntil:
    visible: 'Flip camera'
    timeout: 30000
- tapOn: 'Flip camera'
- extendedWaitUntil:
    visible: 'Take photo'
    timeout: 15000
- tapOn: 'Flip camera'
- extendedWaitUntil:
    visible: 'Take photo'
    timeout: 15000
- tapOn: 'Close camera'
- runFlow:
    file: ../shared/subflows/assert-on-map.yaml
