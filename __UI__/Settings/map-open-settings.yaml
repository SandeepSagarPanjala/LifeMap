appId: com.sunrio.lifemap
---
# P0 — open Settings from the map and return.
- runFlow:
    file: ../shared/subflows/launch-to-map-warm.yaml
- tapOn: Settings
- assertVisible: 'User settings'
# Native stack back button is labeled "Map" (see RootNavigator headerBackTitle).
- tapOn: Map
- extendedWaitUntil:
    visible: 'Take a photo'
    timeout: 10000
- runFlow:
    file: ../shared/subflows/assert-on-map.yaml
