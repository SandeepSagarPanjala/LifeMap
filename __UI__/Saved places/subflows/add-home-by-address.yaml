appId: com.sunrio.lifemap
---
# Add Home via Add by address.
- runFlow:
    file: tap-add-by-address.yaml
- tapOn:
    id: SavedPlaceAddressInput
- inputText: ${HOME_ADDRESS}
- tapOn:
    id: LookupSavedPlaceAddress
- runFlow:
    file: wait-for-kind-step.yaml
- tapOn:
    id: SelectHomeKind
- tapOn:
    id: SaveSavedPlaceByAddress
- extendedWaitUntil:
    visible: 'Show Home on map'
    timeout: 20000
