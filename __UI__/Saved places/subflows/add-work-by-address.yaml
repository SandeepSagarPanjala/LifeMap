appId: com.sunrio.lifemap
---
# Partial address → Back → full address with city/state/zip → Work.
- runFlow:
    file: tap-add-by-address.yaml
- tapOn:
    id: SavedPlaceAddressInput
- inputText: ${WORK_PARTIAL_ADDRESS}
- tapOn:
    id: LookupSavedPlaceAddress
- extendedWaitUntil:
    visible:
      id: SavedPlaceKindStep
    timeout: 20000
    optional: true
- extendedWaitUntil:
    visible:
      id: SavedPlaceGeocodeResultsStep
    timeout: 10000
    optional: true
- runFlow:
    file: back-to-address-input.yaml
- tapOn:
    id: SavedPlaceAddressInput
- eraseText
- inputText: ${WORK_FULL_ADDRESS}
- tapOn:
    id: LookupSavedPlaceAddress
- runFlow:
    file: wait-for-kind-step.yaml
- tapOn:
    id: SelectWorkKind
- tapOn:
    id: SaveSavedPlaceByAddress
- extendedWaitUntil:
    visible: 'Show Work on map'
    timeout: 20000
