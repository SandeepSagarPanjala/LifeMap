appId: com.sunrio.lifemap
---
# Add Favorite when Home and Work are already set.
- runFlow:
    file: tap-add-by-address.yaml
- tapOn:
    id: SavedPlaceAddressInput
- inputText: ${FAVORITE_ADDRESS}
- tapOn:
    id: LookupSavedPlaceAddress
- runFlow:
    file: wait-for-kind-step.yaml
- assertNotVisible:
    id: SelectHomeKind
    optional: true
- assertNotVisible:
    id: SelectWorkKind
    optional: true
- extendedWaitUntil:
    visible:
      id: SavedPlaceFavoriteNameInput
    timeout: 10000
- tapOn:
    id: SavedPlaceFavoriteNameInput
- inputText: ${FAVORITE_NAME}
- tapOn:
    id: SaveSavedPlaceByAddress
- extendedWaitUntil:
    visible: 'Show ${FAVORITE_NAME} on map'
    timeout: 20000
