appId: com.sunrio.lifemap
---
# P0 — after gorhom overlay closes, one backdrop tap must dismiss saved places.
- runFlow:
    file: ../shared/subflows/launch-to-map-warm.yaml
- runFlow:
    file: subflows/open-sheet.yaml
- runFlow:
    file: subflows/tap-add-by-address.yaml
- runFlow:
    file: subflows/dismiss-add-by-address-sheet.yaml
- extendedWaitUntil:
    visible: 'Saved places'
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: AddSavedPlaceByAddress
    timeout: 10000
- runFlow:
    file: subflows/close-sheet.yaml
- runFlow:
    file: ../shared/subflows/assert-on-map.yaml
