appId: com.sunrio.lifemap
---
# iOS / Android permission and alert dialogs that can appear on cold start.
- tapOn:
    text: 'Allow While Using App'
    optional: true
- tapOn:
    text: 'Allow Once'
    optional: true
- tapOn:
    text: 'Allow Motion & Fitness Activity'
    optional: true
- tapOn:
    text: Allow
    optional: true
- tapOn:
    text: OK
    optional: true
