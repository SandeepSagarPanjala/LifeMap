name: iOS TestFlight (manual)

# Upload a Release build to TestFlight. Requires App Store Connect API secrets.
# Easier first path: run `pnpm ios:beta` on your Mac (see docs/ios-testflight.md).
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: TestFlight release notes for testers
        required: false
        default: LifeMap QA build from CI

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: Build and upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CocoaPods
        working-directory: ios
        run: bundle exec pod install --repo-update

      - name: Verify App Store Connect API secrets
        run: |
          if [ -z "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" ]; then
            echo "::error::Add APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_API_KEY_BASE64 repo secrets. See docs/ios-testflight.md"
            exit 1
          fi

      - name: Upload to TestFlight
        working-directory: ios
        env:
          CI: true
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          TESTFLIGHT_CHANGELOG: ${{ inputs.changelog }}
        run: bundle exec fastlane beta
