name: CI

# Automatic on every push/PR — fast JS checks only (~2 min).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  require-issue:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require linked GitHub issue
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          text="${PR_TITLE}"$'\n'"${PR_BODY}"
          # Match #123 (issue/PR refs). Reject bare "#" from the template placeholder.
          if ! printf '%s' "$text" | grep -Eq '(^|[^[:alnum:]_])#[1-9][0-9]*([^[:digit:]]|$)'; then
            echo "::error::Every PR must reference a GitHub issue number (e.g. #91)."
            echo "Add it in the PR title and/or the Issue field in the PR body template."
            echo ""
            echo "Title: ${PR_TITLE}"
            exit 1
          fi
          echo "Found issue reference in PR title/body."

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm exec jest --ci
