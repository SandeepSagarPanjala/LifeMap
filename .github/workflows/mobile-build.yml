name: Mobile build (manual)

# Run from GitHub → Actions → "Mobile build (manual)" → Run workflow.
# Does NOT run on push — saves macOS minutes and keeps PR checks fast.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform to compile
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - both

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Android assembleDebug
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Android SDK path
        run: echo "sdk.dir=${ANDROID_HOME}" >> android/local.properties

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifemap-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios-build:
    name: iOS simulator build
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Gemfile.lock pins Bundler 1.17 (macOS system Ruby) — incompatible with Ruby 3.2.
      # CI installs CocoaPods directly; local dev still uses `bundle exec pod install`.
      - name: Install CocoaPods
        run: gem install cocoapods -v 1.15.2 --no-document

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace ios/LifeMap.xcworkspace \
            -scheme LifeMap \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build
