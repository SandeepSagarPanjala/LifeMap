version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react-native:
        patterns:
          - react-native*
          - '@react-native*'
          - expo*
      testing:
        patterns:
          - jest*
          - '@types/jest*'
          - detox*
    ignore:
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: prettier
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
